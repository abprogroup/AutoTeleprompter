name: Build Android APK (v4.0-Sealed)

on:
  push:
    branches: [ main, master ]
    # Only trigger when Android platform files or this workflow change.
    paths:
      - 'Platform_Android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build AutoTeleprompter for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get
        working-directory: Platform_Android/AutoTeleprompter

      - name: Build Android APK (Debug)
        run: flutter build apk --debug
        working-directory: Platform_Android/AutoTeleprompter

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoTeleprompter-Android-APK
          path: Platform_Android/AutoTeleprompter/build/app/outputs/flutter-apk/app-debug.apk
