name: Build iOS IPA (Free Edition)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get
        working-directory: AutoTeleprompter

      - name: Build iOS (No Signing)
        run: flutter build ios --release --no-codesign
        working-directory: AutoTeleprompter

      - name: Zip .app to .ipa
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos/
          zip -r AutoTeleprompter.ipa Payload
        working-directory: AutoTeleprompter

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AutoTeleprompter-iOS
          path: AutoTeleprompter/build/ios/iphoneos/AutoTeleprompter.ipa
