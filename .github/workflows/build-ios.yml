name: Build iOS IPA (v4.1.4-Sealed)

on:
  push:
    branches: [ main, master ]
    # Only trigger when iOS platform files or this workflow change.
    # paths alone is sufficient — paths-ignore cannot coexist with paths on
    # the same event (GitHub Actions validation error).
    paths:
      - 'Platform_iOS/**'
      - '.github/workflows/build-ios.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java (Requirement for some plugins)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.3'
          cache: true

      - name: Check Environment (Flutter Doctor)
        run: flutter doctor
        working-directory: Platform_iOS/AutoTeleprompter

      - name: Clean Environment
        run: flutter clean
        working-directory: Platform_iOS/AutoTeleprompter

      - name: Install Dependencies
        run: flutter pub upgrade
        working-directory: Platform_iOS/AutoTeleprompter

      - name: Install Cocoapods (iOS only)
        run: |
          sudo gem install cocoapods
          pod --version
        
      - name: Build iOS (No Signing)
        # We add 'v' for verbose logging so we can see the exact error if it fails
        run: |
          flutter build ios --release --no-codesign -v
        working-directory: Platform_iOS/AutoTeleprompter

      - name: Zip .app to .ipa
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos/
          zip -r AutoTeleprompter.ipa Payload
        working-directory: Platform_iOS/AutoTeleprompter

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AutoTeleprompter-iOS
          path: Platform_iOS/AutoTeleprompter/build/ios/iphoneos/AutoTeleprompter.ipa
