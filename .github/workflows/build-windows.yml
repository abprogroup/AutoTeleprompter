name: Build Windows EXE (v4.1.4-Isolated)

on:
  push:
    branches: [ main, master ]
    # ONLY trigger when Windows platform files or this workflow change
    paths:
      - 'Platform_Windows/**'
      - '.github/workflows/build-windows.yml'
    # Never trigger from other platform directories
    paths-ignore:
      - 'Platform_iOS/**'
      - 'Platform_Android/**'
      - 'Platform_macOS/**'
      - 'MASTER_TODO_V4.md'
      - 'DAILY_LOG.md'
      - 'README.md'
      - 'AI_PROTOCOL.md'
  workflow_dispatch:

jobs:
  build:
    name: Build AutoTeleprompter for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Sync Dependencies
        run: flutter pub get
        working-directory: Platform_Windows

      - name: Build Windows Archive
        run: flutter build windows --release
        working-directory: Platform_Windows

      - name: Package Artifacts
        run: |
          mkdir build-zip
          xcopy /E /I Platform_Windows\build\windows\x64\runner\Release build-zip\AutoTeleprompter-Windows
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoTeleprompter-Windows-EXE
          path: build-zip\AutoTeleprompter-Windows
