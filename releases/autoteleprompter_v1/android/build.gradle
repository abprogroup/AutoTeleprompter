// Provide flutter extension to library plugin subprojects that reference flutter.compileSdkVersion
class FlutterExtension {
    int compileSdkVersion = 34
    int minSdkVersion = 21
    int targetSdkVersion = 34
    String ndkVersion = "25.1.8937393"
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Register flutter extension only for non-app subprojects, before their build.gradle evaluates
subprojects {
    beforeEvaluate { proj ->
        if (proj.name != "app" && !proj.extensions.findByName("flutter")) {
            proj.extensions.create("flutter", FlutterExtension)
        }
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
